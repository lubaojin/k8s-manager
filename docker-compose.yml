version: "3.9"

services:
  backend:
    build: ./backend
    container_name: k8s-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: 192.168.3.31
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: k8s_manager
      SECRET_KEY: dev-secret-change-in-production

  frontend:
    build: ./frontend
    container_name: k8s-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
